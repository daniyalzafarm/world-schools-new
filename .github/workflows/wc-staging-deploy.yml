name: WC Staging Deployment

on:
  push:
    tags:
      - 'wc-v*.*.*'

env:
  AZURE_RESOURCE_GROUP: rg-wc-staging-ch-north
  SHARED_RESOURCE_GROUP: rg-wc-infra-shared-ch-north
  AZURE_LOCATION: switzerlandnorth
  ACR_NAME: acrwc
  CONTAINER_APP_NAME: ca-api-wc-stg
  CONTAINER_APP_ENV: cae-wc-stg

jobs:
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#wc-}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

