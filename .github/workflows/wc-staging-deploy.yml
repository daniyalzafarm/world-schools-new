  build-and-deploy-superadmin:
    name: Build and Deploy Superadmin
    runs-on: ubuntu-latest
    needs: extract-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy wc-superadmin to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_ADMIN_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '.'
          output_location: 'apps/wc-superadmin/.next/standalone'
          app_build_command: 'npx nx build wc-superadmin && cp -r apps/wc-superadmin/.next/static apps/wc-superadmin/.next/standalone/.next/ && cp -r apps/wc-superadmin/public apps/wc-superadmin/.next/standalone/'
          skip_api_build: true
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.WC_STAGING_API_URL }}
          NEXT_PUBLIC_AUTH_USING_REQUEST: 'false'
          NEXT_PUBLIC_APP_VERSION: ${{ needs.extract-version.outputs.version }}

