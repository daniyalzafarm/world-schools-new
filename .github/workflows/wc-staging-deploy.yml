name: WC Staging Deployment

on:
  push:
    tags:
      - "wc-v*.*.*"

env:
  AZURE_RESOURCE_GROUP: rg-wc-staging-ch-north
  AZURE_LOCATION: switzerlandnorth
  ACR_NAME: acrwc
  CONTAINER_APP_ENV: cae-wc-stg

  # Container App names
  API_CONTAINER_APP_NAME: ca-api-wc-stg

jobs:
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version
        id: extract
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#wc-v}   # wc-v1.2.3 → 1.2.3
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

  # ----------------------------------------------------------
  # API: Build + Deploy
  # ----------------------------------------------------------
  build-and-deploy-api:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    needs: extract-version

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - run: az acr login --name ${{ env.ACR_NAME }}

      - name: Buildx cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: buildx-api-${{ github.sha }}
          restore-keys: |
            buildx-api-

      - name: Build & Push API Image
        run: |
          docker buildx create --use --name builder || docker buildx use builder

          docker buildx build \
            --build-arg VERSION=${{ needs.extract-version.outputs.version }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/wc-nest-api:${{ needs.extract-version.outputs.version }} \
            -f apps/wc-nest-api/Dockerfile \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache \
            --push \
            .

      - name: Parse API secrets
        id: api-secrets
        run: |
          # Parse comma-separated secrets from GitHub Secrets
          # Format: KEY1=value1,KEY2=value2,KEY3=value3
          SECRETS_RAW="${{ secrets.WC_STAGING_API_SECRETS }}"

          if [ -n "$SECRETS_RAW" ]; then
            echo "Processing API secrets..."

            # Split by comma and process each secret
            IFS=',' read -ra SECRET_PAIRS <<< "$SECRETS_RAW"

            SECRET_NAMES=""
            SECRET_REFS=""

            for pair in "${SECRET_PAIRS[@]}"; do
              # Extract key and value
              KEY=$(echo "$pair" | cut -d'=' -f1 | xargs)
              VALUE=$(echo "$pair" | cut -d'=' -f2- | xargs)

              # Convert KEY to lowercase with hyphens for Azure secret name
              # Example: EMAIL_PASS -> email-pass
              SECRET_NAME=$(echo "$KEY" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

              echo "Setting secret: $SECRET_NAME (from $KEY)"

              # Set the secret in Azure Container App
              az containerapp secret set \
                --name ${{ env.API_CONTAINER_APP_NAME }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --secrets "$SECRET_NAME=$VALUE" \
                --output none

              # Build space-separated list of secret references for environment variables
              # Example: EMAIL_PASS=secretref:email-pass
              if [ -z "$SECRET_REFS" ]; then
                SECRET_REFS="${KEY}=secretref:${SECRET_NAME}"
              else
                SECRET_REFS="$SECRET_REFS ${KEY}=secretref:${SECRET_NAME}"
              fi
            done

            echo "secret_refs=$SECRET_REFS" >> $GITHUB_OUTPUT
            echo "✅ Secrets configured successfully"
          else
            echo "No secrets to configure"
            echo "secret_refs=" >> $GITHUB_OUTPUT
          fi

      - name: Parse API runtime env
        id: api-env
        run: |
          RAW="$(echo "${{ vars.WC_STAGING_API_ENV }}" | tr '\n' ' ')"
          ENV="APP_VERSION=${{ needs.extract-version.outputs.version }} $RAW"

          # Add secret references to environment variables
          SECRET_REFS="${{ steps.api-secrets.outputs.secret_refs }}"
          if [ -n "$SECRET_REFS" ]; then
            ENV="$ENV $SECRET_REFS"
          fi

          echo "env=$ENV" >> $GITHUB_OUTPUT

      - name: Deploy API
        run: |
          az containerapp update \
            --name ${{ env.API_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/wc-nest-api:${{ needs.extract-version.outputs.version }} \
            --set-env-vars ${{ steps.api-env.outputs.env }}

  # ----------------------------------------------------------
  # Frontends (matrix)
  # ----------------------------------------------------------
  build-and-deploy-frontends:
    name: Build & Deploy Frontend Apps
    runs-on: ubuntu-latest
    needs: extract-version

    strategy:
      fail-fast: false
      matrix:
        app:
          - id: superadmin
            dockerfile: apps/wc-superadmin/Dockerfile
            container: ca-admin-wc-stg
            build_env: STAGING_SUPERADMIN_ENV
            runtime_env: STAGING_SUPERADMIN_RUNTIME_ENV

          - id: provider
            dockerfile: apps/wc-provider/Dockerfile
            container: ca-provider-wc-stg
            build_env: STAGING_PROVIDER_ENV
            runtime_env: STAGING_PROVIDER_RUNTIME_ENV

          - id: booking
            dockerfile: apps/wc-booking/Dockerfile
            container: ca-booking-wc-stg
            build_env: STAGING_BOOKING_ENV
            runtime_env: STAGING_BOOKING_RUNTIME_ENV

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - run: az acr login --name ${{ env.ACR_NAME }}

      - name: Buildx cache
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ matrix.app.id }}-${{ github.sha }}
          restore-keys: |
            buildx-${{ matrix.app.id }}-

      # ------------------------------
      # Build ENV
      # ------------------------------
      - name: Prepare build env
        id: build-env
        run: |
          RAW="$(echo "${{ vars[matrix.app.build_env] }}" | tr '\n' ' ')"
          ENV="NEXT_PUBLIC_APP_VERSION=${{ needs.extract-version.outputs.version }} $RAW"
          echo "env=$ENV" >> $GITHUB_OUTPUT

      # ------------------------------
      # Build & Push
      # ------------------------------
      - name: Build & Push Docker Image
        run: |
          docker buildx create --use --name builder || docker buildx use builder

          docker buildx build \
            --build-arg BUILD_ENV="${{ steps.build-env.outputs.env }}" \
            -t ${{ env.ACR_NAME }}.azurecr.io/wc-${{ matrix.app.id }}:${{ needs.extract-version.outputs.version }} \
            -f ${{ matrix.app.dockerfile }} \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache \
            --push \
            .

      # ------------------------------
      # Runtime ENV
      # ------------------------------
      - name: Prepare runtime env
        id: runtime-env
        run: |
          RAW="$(echo "${{ vars[matrix.app.runtime_env] }}" | tr '\n' ' ')"
          ENV="APP_VERSION=${{ needs.extract-version.outputs.version }} $RAW"
          echo "env=$ENV" >> $GITHUB_OUTPUT

      # ------------------------------
      # Deploy to Azure Container App
      # ------------------------------
      - name: Deploy Container App
        run: |
          az containerapp update \
            --name ${{ matrix.app.container }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/wc-${{ matrix.app.id }}:${{ needs.extract-version.outputs.version }} \
            --set-env-vars ${{ steps.runtime-env.outputs.env }}
