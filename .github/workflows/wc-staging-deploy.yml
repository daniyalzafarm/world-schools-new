  build-and-deploy-superadmin:
    name: Build and Deploy Superadmin
    runs-on: ubuntu-latest
    needs: extract-version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci
          npx nx build wc-superadmin
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.WC_STAGING_API_URL }}
          NEXT_PUBLIC_AUTH_USING_REQUEST: 'false'
          NEXT_PUBLIC_APP_VERSION: ${{ needs.extract-version.outputs.version }}

      - name: Prepare deployment structure
        run: |
          # Flatten the nested standalone structure
          cp -r apps/wc-superadmin/.next/standalone/apps/wc-superadmin/. apps/wc-superadmin/.next/standalone
          # Copy static assets
          cp -r apps/wc-superadmin/.next/static apps/wc-superadmin/.next/standalone/.next/
          # Copy public folder
          cp -r apps/wc-superadmin/public apps/wc-superadmin/.next/standalone/
          # Copy staticwebapp.config.json to .next directory
          cp apps/wc-superadmin/staticwebapp.config.json apps/wc-superadmin/.next/

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_ADMIN_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          skip_app_build: true
          app_location: 'apps/wc-superadmin'
          api_location: ''
          output_location: ''

