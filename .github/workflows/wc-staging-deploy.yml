name: WC Staging Deployment

on:
  push:
    tags:
      - "wc-v*.*.*"

permissions:
  contents: read

concurrency:
  group: wc-staging-deploy
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: rg-wc-staging-ch-north
  AZURE_LOCATION: switzerlandnorth
  ACR_NAME: acrwc
  CONTAINER_APP_ENV: cae-wc-stg

  # Container App names
  API_CONTAINER_APP_NAME: ca-api-wc-stg

jobs:
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version
        id: extract
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#wc-v}   # wc-v1.2.3 → 1.2.3
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

  # ----------------------------------------------------------
  # API: Build + Deploy
  # ----------------------------------------------------------
  build-and-deploy-api:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: extract-version

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Buildx cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-api-${{ github.sha }}
          restore-keys: |
            buildx-api-

      - name: Build & Push API Image
        run: |
          docker buildx build \
            --build-arg VERSION=${{ needs.extract-version.outputs.version }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/wc-nest-api:${{ needs.extract-version.outputs.version }} \
            -f apps/wc-nest-api/Dockerfile \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --push \
            .

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Parse API secrets
        id: api-secrets
        run: |
          # Parse newline-separated secrets from GitHub Secrets.
          # Format: one KEY=value per line. Blank lines are skipped.
          SECRETS_RAW="${{ secrets.WC_STAGING_API_SECRETS }}"

          if [ -n "$SECRETS_RAW" ]; then
            echo "Processing API secrets..."

            SECRET_PAIRS=()
            while IFS= read -r line; do
              trimmed=$(echo "$line" | xargs)
              [ -n "$trimmed" ] && SECRET_PAIRS+=("$trimmed")
            done <<< "$SECRETS_RAW"

            SECRET_NAMES=""
            SECRET_REFS=""

            for pair in "${SECRET_PAIRS[@]}"; do
              # Extract key and value
              KEY=$(echo "$pair" | cut -d'=' -f1 | xargs)
              VALUE=$(echo "$pair" | cut -d'=' -f2- | xargs)

              # Convert KEY to lowercase with hyphens for Azure secret name
              # Example: EMAIL_PASS -> email-pass
              SECRET_NAME=$(echo "$KEY" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

              echo "Setting secret: $SECRET_NAME (from $KEY)"

              # Set the secret in Azure Container App
              az containerapp secret set \
                --name ${{ env.API_CONTAINER_APP_NAME }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --secrets "$SECRET_NAME=$VALUE" \
                --output none

              # Build space-separated list of secret references for environment variables
              # Example: EMAIL_PASS=secretref:email-pass
              if [ -z "$SECRET_REFS" ]; then
                SECRET_REFS="${KEY}=secretref:${SECRET_NAME}"
              else
                SECRET_REFS="$SECRET_REFS ${KEY}=secretref:${SECRET_NAME}"
              fi
            done

            echo "secret_refs=$SECRET_REFS" >> $GITHUB_OUTPUT
            echo "✅ Secrets configured successfully"
          else
            echo "No secrets to configure"
            echo "secret_refs=" >> $GITHUB_OUTPUT
          fi

      - name: Parse API runtime env
        id: api-env
        run: |
          # tr -d '\r' first: if the GH variable was pasted with CRLF endings,
          # every value gets a trailing \r that breaks strict string compares
          # in app code (e.g. POSTGRES_REQUIRE_SSL === 'true' → false).
          RAW="$(echo "${{ vars.WC_STAGING_API_ENV }}" | tr -d '\r' | tr '\n' ' ')"
          ENV="APP_VERSION=${{ needs.extract-version.outputs.version }} $RAW"

          # Add secret references to environment variables
          SECRET_REFS="${{ steps.api-secrets.outputs.secret_refs }}"
          if [ -n "$SECRET_REFS" ]; then
            ENV="$ENV $SECRET_REFS"
          fi

          echo "env=$ENV" >> $GITHUB_OUTPUT

      - name: Deploy API
        run: |
          az containerapp update \
            --name ${{ env.API_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/wc-nest-api:${{ needs.extract-version.outputs.version }} \
            --set-env-vars ${{ steps.api-env.outputs.env }}

  # ----------------------------------------------------------
  # Health Check: Verify API is healthy before deploying frontends
  # ----------------------------------------------------------
  verify-api-health:
    name: Verify API Health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [extract-version, build-and-deploy-api]

    steps:
      - name: Wait for API to be ready
        run: |
          echo "⏳ Waiting for API to be ready..."
          sleep 30  # Give Container App time to restart

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - name: Get API URL
        id: api-url
        run: |
          API_FQDN=$(az containerapp show \
            --name ${{ env.API_CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)

          API_URL="https://${API_FQDN}"
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "🌐 API URL: $API_URL"

      - name: Health check with retry
        run: |
          API_URL="${{ steps.api-url.outputs.api_url }}"
          EXPECTED_VERSION="${{ needs.extract-version.outputs.version }}"
          MAX_RETRIES=10
          RETRY_DELAY=15

          echo "🏥 Checking API health at: ${API_URL}/health"
          echo "🎯 Expected version: ${EXPECTED_VERSION}"

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health" || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API is responding (HTTP $HTTP_CODE)"

              # Get the full response
              RESPONSE=$(curl -s "${API_URL}/health")
              echo "Response: $RESPONSE"

              # Verify response contains expected fields
              if echo "$RESPONSE" | grep -q '"status":"ok"'; then
                echo "✅ Status is OK"

                # Extract version from response
                DEPLOYED_VERSION=$(echo "$RESPONSE" | grep -o '"version":"[^"]*"' | cut -d'"' -f4)
                echo "📦 Deployed version: ${DEPLOYED_VERSION}"

                # Verify version matches expected version
                if [ "$DEPLOYED_VERSION" = "$EXPECTED_VERSION" ]; then
                  echo "✅ Version verification passed - API is running v${EXPECTED_VERSION}"
                  exit 0
                else
                  echo "⚠️ Version mismatch: expected v${EXPECTED_VERSION}, got v${DEPLOYED_VERSION}"
                  echo "   Container App may still be deploying the new version..."
                fi
              else
                echo "⚠️ Unexpected health check response (missing status:ok)"
              fi
            else
              echo "❌ Health check failed (HTTP $HTTP_CODE)"
            fi

            if [ $i -lt $MAX_RETRIES ]; then
              echo "⏳ Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            fi
          done

          echo "❌ API health check failed after $MAX_RETRIES attempts"
          echo "   Either the API is not healthy, or it's not running version ${EXPECTED_VERSION}"
          exit 1

  # ----------------------------------------------------------
  # Frontends (matrix)
  # ----------------------------------------------------------
  build-and-deploy-frontends:
    name: Build & Deploy Frontend Apps
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [extract-version, verify-api-health]  # ✅ Wait for backend to be healthy

    strategy:
      fail-fast: false
      matrix:
        app:
          - id: superadmin
            dockerfile: apps/wc-superadmin/Dockerfile
            container: ca-admin-wc-stg
            build_env: STAGING_SUPERADMIN_ENV
            runtime_env: STAGING_SUPERADMIN_RUNTIME_ENV

          - id: provider
            dockerfile: apps/wc-provider/Dockerfile
            container: ca-provider-wc-stg
            build_env: STAGING_PROVIDER_ENV
            runtime_env: STAGING_PROVIDER_RUNTIME_ENV

          - id: booking
            dockerfile: apps/wc-booking/Dockerfile
            container: ca-booking-wc-stg
            build_env: STAGING_BOOKING_ENV
            runtime_env: STAGING_BOOKING_RUNTIME_ENV

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Buildx cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ matrix.app.id }}-${{ github.sha }}
          restore-keys: |
            buildx-${{ matrix.app.id }}-

      # ------------------------------
      # Build ENV
      # ------------------------------
      - name: Prepare build env
        id: build-env
        run: |
          RAW="$(echo "${{ vars[matrix.app.build_env] }}" | tr -d '\r' | tr '\n' ' ')"
          ENV="NEXT_PUBLIC_APP_VERSION=${{ needs.extract-version.outputs.version }} $RAW"
          echo "env=$ENV" >> $GITHUB_OUTPUT

      # ------------------------------
      # Build & Push
      # ------------------------------
      - name: Build & Push Docker Image
        run: |
          docker buildx build \
            --build-arg BUILD_ENV="${{ steps.build-env.outputs.env }}" \
            -t ${{ env.ACR_NAME }}.azurecr.io/wc-${{ matrix.app.id }}:${{ needs.extract-version.outputs.version }} \
            -f ${{ matrix.app.dockerfile }} \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --push \
            .

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ------------------------------
      # Runtime ENV
      # ------------------------------
      - name: Prepare runtime env
        id: runtime-env
        run: |
          RAW="$(echo "${{ vars[matrix.app.runtime_env] }}" | tr -d '\r' | tr '\n' ' ')"
          ENV="APP_VERSION=${{ needs.extract-version.outputs.version }} $RAW"
          echo "env=$ENV" >> $GITHUB_OUTPUT

      # ------------------------------
      # Deploy to Azure Container App
      # ------------------------------
      - name: Deploy Container App
        run: |
          az containerapp update \
            --name ${{ matrix.app.container }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/wc-${{ matrix.app.id }}:${{ needs.extract-version.outputs.version }} \
            --set-env-vars ${{ steps.runtime-env.outputs.env }}
